services:
  personal-expenses:
    build: .
    container_name: personal-expenses
    restart: unless-stopped
    environment:
      CARD_EXPENSE_DB: /data/expenses.db
    volumes:
      - personal-expenses-data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  personal-expenses-data:
